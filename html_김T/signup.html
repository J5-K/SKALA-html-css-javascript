<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <style>
        body {
            margin: 0;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            background-color: white;
            z-index: 100;
            border-bottom: 1px solid #ccc;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 150px 20px 30px;
            /* 위쪽 150px로 고정 헤더 공간 확보 */
        }
    </style>
</head>
<body>
   <header class="header">
        <h2>👤 회원가입</h2>
        <p>SKALA 광주 3반 2조의 회원가입을 환영합니다.</p>
    </header>

    <div class="container">
        <form action="result.html" method="get">
            <fieldset>
                <legend>계정 정보</legend>
                <p>
                    <label for="userID">아이디: </label>
                    <input type="text" id="userID" name="userID"
                    required placeholder="4~15자 영문/숫자" pattern="[A-Za-z0-9]{4,12}"> 
                    <small>(필수)</small>
                </p>
                <p>
                    <label for="userPw">비밀번호: </label>
                    <input type="password" id="userPw" name="userPw" minlength="8" 
                    required placeholder="8자 이상 입력">
                    <small>(필수)</small>
                </p>
                <p>
                    <label for="phoneNum">전화번호: </label>
                    <input type="tel" id="phoneNum" name="phoneNum" required placeholder="010-0000-0000">
                    <small>(필수)</small>
                </p>
                <p>
                    <label for="userEmail">이메일: </label>
                    <input type="text" id="userEmail" name="userEmail" required placeholder="example">
                    @
                    <select name="emailDomain">
                        <option value="" disabled selected>-- 선택해주세요 --</option>
                        <option value="direct">직접 입력</option>
                        <option value="naver.com">naver.com</option>
                        <option value="gmail.com">gmail.com</option>
                        <option value="daum.net">daum.net</option>
                    </select>
                     <small>(필수)</small>
                </p>
            </fieldset>

            <br>

            <fieldset>
                <legend>개인 프로필 정보</legend>
                <p>
                    <label for="userName">이름: </label>
                    <input type="text" id="userName" name="userName" required>
                </p>
                <p>
                    <label for="userBirth">생년월일: </label>
                    <input type="date" id="userBirth" name="userBirth">
                </p>
                <p>
                    성별: 
                    <label><input type="radio" name="gender" value="male"> 남성</label>
                    <label><input type="radio" name="gender" value="female"> 여성</label>
                    <label><input type="radio" name="gender" value="none"> 선택 안함</label>
                </p>
                <p>
                    관심 분야(복수 선택 가능): <br>
                    <label><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label><br>
                    <label><input type="checkbox" name="interest" value="backend"> 웹 백엔드 (Node.js/Python)</label><br>
                    <label><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label><br>
                    <label><input type="checkbox" name="interest" value="ai"> 인공지능 (AI)</label><br>
                </p>
                <p>
                    <label for="joinPath">가입 경로: </label>
                    <select id="joinPath" name="joinPath">
                        <option value="" disabled selected>-- 선택해주세요 --</option>
                        <option value="search">인터넷 검색</option>
                        <option value="friend">친구 추천</option>
                        <option value="sns">SNS 광고</option>
                        <option value="other">기타</option>
                    </select>
            </fieldset>
            <br>
            <fieldset>
                <legend>자기소개</legend>
                <p>
                    <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br>
                    <textarea id="intro" name="intro" rows="5" cols="50" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
                </p>
            </fieldset>

            <br>
            <p>
                <input type="checkbox" name="agree" required> <label for="agree">개인정보 수집 및 이용에 동의합니다. (필수)</label>
            </p>
            <input type="submit" class="btn-submit" value="동의하고 회원가입">
            <input type="reset" class="btn-reset" value="다시 작성">
        </form>

    </div>
</body>
</html>
