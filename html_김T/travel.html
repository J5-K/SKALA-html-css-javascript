<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고흥 여행</title>
    <link rel="stylesheet" href="../css/style_travel.css">
</head>
<body>
    <header id="home" class="hero">
        <nav class="fixed-nav" aria-label="주요메뉴">
            <a href= #home aria-label="고흥 여행 페이지 처음으로"> 고흥</a>
            <div class="nav-links">
                <a href = "#about"> 고흥 소개 </a>
                <<a href = "#attractions"> 명소 </a>
                <a href = "#food"> 먹거리 </a>
                <a href = "#video"> 영상 </a>
            </div>
        </nav>
        <div class="hero-content">
            <p class="eyebrow">Journey to Goheung</p>
            <h1>
                우주로 떠나는 여행, <br>
                고흥으로 떠나요
            </h1>
            <p>
                푸른 바다와 우주가 만나는 곳, 따뜻한 한 끼가 기다리는 고흥 여행
            </p>
            <a class="hero-button" href="#attractions"> 여행 시작 🔽</a>
        </div>
    </header>

    <main>
        <section id="about" class="intro-section">
            <div>
                <p class="section-label">ABOUT GOHEUNG</p>
                <h2> 바다 보고, 별 보고, 고흥! </h2>
            </div>
            <p>
                웅장한 팔영산과 아름다운 다도해, 향긋한 유자밭과 대한민국 우주산업의 꿈을 품은 나로우주센터까지.
                자연과 미래가 조화롭게 공존하는 고흥에서 특별한 여행을 시작하세요.
            </p>
        </section>
        <section id="attractions" class="attractions-section">
            <div class="section-heading">
                <div> 
                    <p class="section-label">MUST VISIT</p>
                    <h2> 고흥의 추천 명소</h2>
                </div>
                <small> 사진 위에 마우스를 올려보세요 </small>
                <div class ="gallary">
                    <figure class="place-card">
                        <div class="image-frame">
                            <img src="../media/나로우주센터.png"
                            alt="우주를 향해 나아가는 고흥"> alt가 뭐햐는거야 여기서?
                            <span>01</span>
                        </div>
                        <figcaption>
                            <h3>나로우주센터</h3>
                            <p>바다와 우주가 만나는 곳</p>
                        </figcaption>
                    </figure>
                    <figure class="place-card">
                        <div class="image-frame">
                            <img src="../media/남열해수욕장.png"
                            alt="고흥의 노을 풍경">
                            <span>02</span>
                        </div>
                        <figcaption>
                            <h3>남열해수욕장</h3>
                            <p>차세대 서핑의 성지이자 노을 맛집</p>
                        </figcaption>
                    </figure>
                    <figure class="place-card">
                        <div class="image-frame">
                            <img src="../media/쑥섬.png"
                            alt="나만 알고싶은 섬, 쑥섬">
                            <span>03</span>
                        </div>
                        <figcaption>
                            <h3>쑥섬</h3>
                            <p>바다 위 정원과 꽃, 고양이가 있는 쑥섬 풍경</p>
                        </figcaption>
                    </figure>
                </div>
            </div>
        </section>
        <section id="food" class="food-section">

            여기부터 다시 시작



        </section>
    </main>
</body>
</html>
