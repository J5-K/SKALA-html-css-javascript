<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행지</title>
    <style>
        .trip-grid-container {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 20px;
        }

        .trip-card {
            margin: 0;
            text-align: center;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        .trip-card img {
            max-width: 100%;
            height: auto;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✈️ 나의 여행앨범🎵</h1>
        <audio controls autoplay>
            <source src="../media/music.mp3" type="audio/mpeg">
        </audio>
        <hr>
        <div class="trip-grid-container">
            <p class="trip-card">
                <img src="../media/trip1.jpeg" width="300" height="400" alt="CNN"> <br>CNN (2023)
            </p>
            <p class="trip-card">
                <img src="../media/trip2.png" width="400" height="200" alt="그냥 스크린샷"> <br>그냥 스크린샷 (2026)
            </p>
            <p class="trip-card">
                <img src="../media/trip3.jpeg" width="400" height="200" alt="여행지 3"><br>그냥 노을 (2023)
            </p>
            </p>
        </div>
        <hr>
        <h2>📹 여행 브이로그</h2>
        <p>
            <video width="400" height="225" controls>
                <source src="../media/trip_video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <br>여행가고싶다
        </p>
    </div>
</body>
</html>
